<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus sur l'Essentiel | Brasserie STAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --star-gold: #f1c40f;
            --star-red: #D2122E;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #050505;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            color: white;
        }

        /* --- BACKGROUND DYNAMIQUE --- */
        .bg-slider {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }

        .bg-img {
            position: absolute;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: bgFade 12s infinite ease-in-out;
            filter: grayscale(30%) brightness(40%);
        }

        /* Fanamboarana ny lalana mankany amin'ny sary */
        .bg-img:nth-child(1) { background-image: url('photo (11).png'); }
        .bg-img:nth-child(2) { background-image: url('photo (12).jpg'); animation-delay: 6s; }

        @keyframes bgFade {
            0%, 10% { opacity: 0.6; }
            45%, 55% { opacity: 0; }
            90%, 100% { opacity: 0.6; }
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* --- HEADER --- */
        .top-nav {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            z-index: 10;
        }

        .theme-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--star-gold);
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .status-pill h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .live-indicator {
            height: 8px; width: 8px;
            background: #2ecc71;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- CARD SLIDER --- */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .card {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 290px;
            border-radius: 35px;
            padding: 35px 25px;
            border: 1px solid var(--glass-border);
            text-align: center;
            opacity: 0;
            transform: scale(0.9) translateY(30px);
            animation: cardCycle 15s infinite ease-in-out;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 5s; }
        .card:nth-child(3) { animation-delay: 10s; }

        @keyframes cardCycle {
            0%, 2% { opacity: 0; transform: scale(0.9) translateY(30px); }
            10%, 30% { opacity: 1; transform: scale(1) translateY(0); }
            38%, 100% { opacity: 0; transform: scale(0.9) translateY(-30px); }
        }

        .photo-wrap {
            width: 140px; height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, var(--star-gold), transparent);
        }

        .photo-circle {
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
        }

        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .card h2 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; margin-bottom: 5px; }
        .card .tag { font-size: 0.7rem; color: var(--star-gold); font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; }

        .info-box {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- FOOTER & CTA --- */
        .bottom-nav {
            width: 100%;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .btn-voir {
            background: white;
            color: black;
            text-decoration: none;
            padding: 14px 60px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .btn-voir:hover {
            transform: scale(1.1);
            background: var(--star-gold);
            box-shadow: 0 15px 30px rgba(241, 196, 15, 0.3);
        }

        .copyright {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="bg-img"></div>
        <div class="bg-img"></div>
    </div>

    <div class="overlay"></div>

    <div class="top-nav">
        <div class="theme-title">Brasserie STAR Madagascar</div>
        <div class="status-pill">
            <div class="live-indicator"></div>
            <h1>Focus sur l'Essentiel</h1>
        </div>
    </div>

    <div class="slider-container">
        <div class="card">
            <div class="photo-wrap">
                <div class="photo-circle"><img src="photo (5).jpg" alt="Mihira"></div>
            </div>
            <h2>RAMAMONJY</h2>
            <div class="tag">SECTION A</div>
            <div class="info-box">
                Mihira Ny Valimbavaka<br>Etudiant N° 43
            </div>
        </div>

        <div class="card">
            <div class="photo-wrap">
                <div class="photo-circle"><img src="photo (6).jpg" alt="Christian"></div>
            </div>
            <h2>ANDRIANISA</h2>
            <div class="tag">SECTION A</div>
            <div class="info-box">
                Tojanahary Christian<br>Etudiant N° 04
            </div>
        </div>

        <div class="card">
            <div class="photo-wrap">
                <div class="photo-circle"><img src="photo(9).jpg" alt="Tiavina"></div>
            </div>
            <h2>RAHARIMAMONJY</h2>
            <div class="tag">SECTION A</div>
            <div class="info-box">
                Tiavina Fenosoa<br>Etudiant N° 28
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="btn-voir">Voir le Projet</a>
        <div class="copyright">&copy; 2026 PROJET UNIVERSITAIRE USVPA</div>
    </div>

</body>
</html>
