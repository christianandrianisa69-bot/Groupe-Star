<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR | Livraison</title>
    <style>
        :root {
            --jaune-thb: #ffc107;
            --bleu-star: #0091ff;
            --noir-fond: #1a1a1a;
            --blanc: #ffffff;
            --gris-clair: #f4f7f6;
            --rouge-star: #d32f2f;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--gris-clair);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--noir-fond);
            color: white;
            padding: 20px;
            border-bottom: var(--jaune-thb) 5px solid;
            text-align: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: var(--blanc);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .step-title {
            color: var(--noir-fond);
            border-bottom: 2px solid #eee;
            margin: 20px 0 15px 0;
            padding-bottom: 5px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        input, textarea { 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 1rem;
            background: #fafafa;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        /* --- CALCULATRICE --- */
        .resume-container {
            background: #fffdf5;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed var(--jaune-thb);
            margin-bottom: 15px;
        }

        .total-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--jaune-thb);
            border-radius: 8px;
            font-weight: bold;
            color: var(--rouge-star);
            text-align: right;
        }

        /* --- MODE PAIEMENT RESPONSIVE --- */
        .payment-methods {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .payment-methods input[type="radio"] {
            display: none;
        }

        .method-button {
            flex: 1;
            padding: 15px 5px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .payment-methods input[type="radio"]:checked + .method-button {
            background-color: #e3f2fd;
            border-color: var(--bleu-star);
            color: var(--bleu-star);
        }

        /* --- ANIMATION "ENVOYÉ AVEC SUCCÈS" --- */
        .btn-envoyer {
            background: var(--noir-fond);
            color: var(--jaune-thb);
            width: 100%;
            padding: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #success-message {
            display: none;
            text-align: center;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: bold;
            border: 1px solid #c8e6c9;
        }

        /* Rehefa tsindrina ny bokotra vao miseho ilay animation */
        .btn-envoyer:active + #success-message {
            display: block;
            animation: showThenFade 15s forwards;
        }

        @keyframes showThenFade {
            0% { transform: scale(0.5); opacity: 0; }
            5% { transform: scale(1.1); opacity: 1; } /* Miseho be ilay soratra */
            10% { transform: scale(1); } /* Mihantona eo */
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); display: none; } /* Miala tsimoramora */
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 480px) {
            .payment-methods { flex-direction: column; }
            .form-container { padding: 20px; }
        }

        .contact-cta { margin: 20px 0; text-align: center; }
        .btn-contact {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid var(--noir-fond);
            color: var(--noir-fond);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        footer { text-align: center; padding: 20px; color: #888; font-size: 0.75rem; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0"><span style="color:var(--jaune-thb)">STAR</span> MADAGASCAR</h1>
</header>

<main class="main-content">
    <div class="form-container">
        <form action="#">
            <div class="step-title">1. Informations Client</div>
            <input type="text" placeholder="Nom complet" required>
            <input type="tel" placeholder="Téléphone" required>
            <textarea rows="2" placeholder="Adresse de livraison..." required></textarea>

            <div class="step-title">2. Votre Commande</div>
            <textarea rows="2" placeholder="Détails des produits..." required></textarea>

            <div class="step-title">3. Calcul (Frais : 5 000 Ar)</div>
            <div class="resume-container">
                <input type="number" class="total-input" placeholder="Total à payer (Ar)">
            </div>

            <div class="step-title">4. Mode de Paiement</div>
            <div class="payment-methods">
                <input type="radio" name="pay" id="mvola" checked>
                <label for="mvola" class="method-button" style="border-bottom: 4px solid #00c853;">MVola</label>

                <input type="radio" name="pay" id="orange">
                <label for="orange" class="method-button" style="border-bottom: 4px solid #ff6600;">Orange</label>

                <input type="radio" name="pay" id="airtel">
                <label for="airtel" class="method-button" style="border-bottom: 4px solid #e11010;">Airtel</label>
            </div>

            <button type="submit" class="btn-envoyer">Confirmer l'envoi</button>
            <div id="success-message">Envoyé avec succès ✅</div>
        </form>
    </div>

    <div class="contact-cta">
        <a href="contact.html" class="btn-contact">📞 CONTACTEZ-NOUS</a>
    </div>
</main>

<footer>
    &copy; 2026 Brasserie STAR Madagascar
</footer>

</body>
</html>
